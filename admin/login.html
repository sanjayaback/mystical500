<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MysticTools Admin - Login</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-container {
  background: white;
  padding: 2.5rem;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 400px;
  margin: 1rem;
}

.login-header {
  text-align: center;
  margin-bottom: 2rem;
}

.login-header h1 {
  color: #333;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
}

.login-header p {
  color: #666;
  font-size: 0.95rem;
}

.login-form {
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.form-group label {
  color: #333;
  font-weight: 500;
  font-size: 0.9rem;
}

.form-group input {
  padding: 0.75rem 1rem;
  border: 2px solid #e1e5e9;
  border-radius: 8px;
  font-size: 1rem;
  transition: border-color 0.2s;
}

.form-group input:focus {
  outline: none;
  border-color: #667eea;
}

.login-button {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  padding: 0.875rem 1.5rem;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.login-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
}

.login-button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.error-message {
  background: #fee;
  color: #c33;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  border: 1px solid #fcc;
  font-size: 0.9rem;
  display: none;
}

.success-message {
  background: #efe;
  color: #3c3;
  padding: 0.75rem 1rem;
  border-radius: 8px;
  border: 1px solid #cfc;
  font-size: 0.9rem;
  display: none;
}

.security-info {
  margin-top: 1.5rem;
  padding: 1rem;
  background: #f8f9fa;
  border-radius: 8px;
  font-size: 0.85rem;
  color: #666;
}

.security-info h3 {
  color: #333;
  font-size: 0.95rem;
  margin-bottom: 0.5rem;
}

.security-info ul {
  margin-left: 1.2rem;
  margin-top: 0.5rem;
}

.security-info li {
  margin-bottom: 0.25rem;
}

.loading {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid #ffffff;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 0.8s linear infinite;
  margin-right: 0.5rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 480px) {
  .login-container {
    padding: 2rem 1.5rem;
    margin: 1rem;
  }
  
  .login-header h1 {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🔐 Admin Login</h1>
      <p>MysticTools Content Management</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          required 
          autocomplete="username"
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required 
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-button" id="loginButton">
        Sign In
      </button>
    </form>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <div class="security-info">
      <h3>🔒 Security Information</h3>
      <ul>
        <li>Default credentials: admin / admin123</li>
        <li>Change password in production</li>
        <li>Sessions expire after 24 hours</li>
        <li>All connections use secure cookies</li>
      </ul>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const loginForm = document.getElementById('loginForm');
      const loginButton = document.getElementById('loginButton');
      const errorMessage = document.getElementById('errorMessage');
      const successMessage = document.getElementById('successMessage');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      function showMessage(element, message) {
        element.textContent = message;
        element.style.display = 'block';
        
        // Hide other messages
        if (element === errorMessage) {
          successMessage.style.display = 'none';
        } else {
          errorMessage.style.display = 'none';
        }

        // Auto-hide after 5 seconds
        setTimeout(() => {
          element.style.display = 'none';
        }, 5000);
      }

      function setLoading(loading) {
        loginButton.disabled = loading;
        if (loading) {
          loginButton.innerHTML = '<span class="loading"></span>Signing in...';
        } else {
          loginButton.innerHTML = 'Sign In';
        }
      }

      async function handleLogin(event) {
        event.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
          showMessage(errorMessage, 'Please enter both username and password');
          return;
        }

        setLoading(true);
        errorMessage.style.display = 'none';

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();

          if (response.ok && data.success) {
            showMessage(successMessage, 'Login successful! Redirecting...');
            setTimeout(() => {
              window.location.href = '/admin/';
            }, 1000);
          } else {
            showMessage(errorMessage, data.error || 'Login failed. Please try again.');
            passwordInput.value = '';
            passwordInput.focus();
          }
        } catch (error) {
          showMessage(errorMessage, 'Network error. Please check your connection and try again.');
        } finally {
          setLoading(false);
        }
      }

      // Check if already authenticated
      async function checkAuthStatus() {
        try {
          const response = await fetch('/api/check-auth');
          const data = await response.json();
          
          if (data.authenticated) {
            window.location.href = '/admin/';
          }
        } catch (error) {
          // Ignore auth check errors
        }
      }

      // Event listeners
      loginForm.addEventListener('submit', handleLogin);

      // Check auth status on page load
      checkAuthStatus();

      // Focus on username field
      usernameInput.focus();
    })();
  </script>
</body>
</html>
